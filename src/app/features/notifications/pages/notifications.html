<div class="notifications-container">

  <h1>🔔 Notificaciones</h1>

  <!-- 🧪 DEBUG VISUAL (puedes borrarlo después) -->
  <p *ngIf="notifications.length === 0">
    No hay notificaciones para mostrar
  </p>

  <div *ngFor="let n of notifications" class="notif-card">

    <p>{{ n.message }}</p>

    <small>
      {{ n.createdAt ? (n.createdAt | date) : 'Sin fecha' }}
    </small>

    <div class="actions">

      <button
        (click)="markRead(n._id!)"
        [disabled]="n.read">

        {{ n.read ? 'Leída ✅' : 'Marcar leída' }}

      </button>

      <button (click)="delete(n._id!)">
        Eliminar
      </button>

    </div>

  </div>

</div>
